<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Футбол в Митино</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <aside class="sidebar" id="sidebar">

        <img class="brand-logo" src="favicon.svg" alt="МЯЧ">

      </div>

      </button>
    </div>
    <nav id="main-menu" class="menu"></nav>
    <div id="tournament-filters" class="filters hidden">
      <label>Турнир<select id="tournament-select"></select></label>
      <label>Сезон<select id="season-select"></select></label>
      <label>Раздел<select id="section-select"></select></label>
    </div>
  </aside>

  <main class="content">
    <div id="status" class="status">Загрузка данных…</div>
    <div id="app"></div>
    <footer class="site-footer">© MitinoSarayTeam</footer>

  <script src="app.js"></script>

</html>
